<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — MarketLocal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/CSS/chat.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="home.html" class="navbar-brand">
        <i class="ti ti-shopping-bag"></i> MarketLocal
      </a>
      <a href="account.html" class="btn btn-outline-primary">Tài khoản</a>
    </div>
  </nav>

  <div class="container chat-container">
    <div class="chat-header" id="chatHeader">
      <!-- JS sẽ render -->
    </div>

    <div class="chat-messages" id="chatMessages">
      <!-- Messages load realtime -->
    </div>

    <div class="chat-input-area">
      <div class="input-group">
        <input type="text" id="messageInput" class="form-control" placeholder="Nhập tin nhắn..." autocomplete="off" />
        <button class="btn btn-primary" id="sendBtn">
          <i class="ti ti-send"></i>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/JS/chat.js"></script>
</body>
</html>
